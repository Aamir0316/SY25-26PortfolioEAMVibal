<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width-device-width, initial-scale=1.0" />
    <meta name="description" content="4Q Portfolio" />
    <meta name="keywords" content="4Q, Portfolio, Projects, Web Development" />
    <meta name="Erwyn Aamir M. Vibal" content="4Q" />
    <title>Movie List</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 40px;
      }

      .container {
        width: 500px;
        background: white;
        padding: 30px;
        border-radius: 6px;
        margin: 40px auto;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
      }

      /* - Add button - */

      button {
        width: 100%;
        padding: 10px;
        background: orange;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      /* - Star design - */

      .star {
        font-size: 20px;
        color: lightgray;
        cursor: pointer;
      }

      .star.selected {
        color: gold;
      }

      /* - Movie list - */

      .movie {
        background: #eeeeee;
        padding: 8px;
        margin-top: 8px;
        border-radius: 4px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h3>Add a Movie</h3>

      <form id="movieForm">
        <label>Title</label>
        <input type="text" id="title" required />

        <label>Year</label>
        <input type="number" id="year" required />

        <label>Genre</label>
        <select id="genre">
          <option>Action</option>
          <option>Comedy</option>
          <option>Drama</option>
          <option>Horror</option>
          <option>Sci-Fi</option>
          <option>Romance</option>
        </select>

        <label>Rating</label>

        <div id="stars">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>

        <br />

        <button type="submit">Add Movie</button>
      </form>

      <h3>Movie List</h3>

      <div id="movieList"></div>
    </div>

    <script>
    
    /* - Star rating - */

      let rating = 0;
      const stars = document.querySelectorAll(".star");

      /* - Add click feature to each stars so that users can select a rating from 1–5 - */

      stars.forEach((star) => {
        star.addEventListener("click", function () {
          rating = this.dataset.value;

          stars.forEach((s) => s.classList.remove("selected"));

          for (let i = 0; i < rating; i++) {
            stars[i].classList.add("selected");
          }
        });
      });

      /* - Loading movies from local storage - */

      function loadMovies() {
        const movieList = document.getElementById("movieList");
        movieList.innerHTML = "";

        let movies = JSON.parse(localStorage.getItem("movies")) || [];

        movies.forEach((movie) => {
          let starDisplay = "★".repeat(movie.rating);

          let div = document.createElement("div");
          div.className = "movie";

          div.innerHTML = `${movie.title} (${movie.year}) - ${movie.genre} | Rating: <span style="color:gold">${starDisplay}</span>`;

          movieList.appendChild(div);
        });
      }

      /* - Adding movies - */

      document.getElementById("movieForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const title = document.getElementById("title").value;
        const year = document.getElementById("year").value;
        const genre = document.getElementById("genre").value;

        let movies = JSON.parse(localStorage.getItem("movies")) || [];

        /* - JS Object structure required by rubric - */

        const newMovie = {
          title: title,
          year: year,
          genre: genre,
          rating: rating,
        };

        movies.push(newMovie);

        /* - Save as a string - */

        localStorage.setItem("movies", JSON.stringify(movies));

        /* - Reset form - */

        document.getElementById("movieForm").reset();

        rating = 0;
        stars.forEach((s) => s.classList.remove("selected"));

        loadMovies();
      });

      /* - Load the movies when the page opens - */

      loadMovies();
    </script>
  </body>
</html>
